version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - erp_db:/var/lib/mysql
    networks:
      - erp-network
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo_backend:
    image: erp_backend:latest
    container_name: erp_backend
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - erp-network
    restart: always

volumes:
  erp_db:

networks:
  erp-network:
    driver: bridge