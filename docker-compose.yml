services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - erp_db:/var/lib/mysql
    networks:
      - erp-network
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - erp-network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  erp_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: erp_backend:latest
    container_name: erp_backend
    environment:
      # Spring
      SPRING_PROFILES_ACTIVE: dev
      # Database — use Docker service name, not localhost
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      # Redis — use Docker service name
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
      # OTP
      OTP_EXPIRATION: ${OTP_EXPIRATION}
      OTP_LENGTH: ${OTP_LENGTH}
      # CORS — allow both localhost and Docker internal
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://erp_frontend:3000
      # App URLs
      APP_FRONTEND_URL: http://localhost:3000
      APP_BASE_URL: http://localhost:5000
      # Mail
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      # OAuth2
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      # Admin seed
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_FIRST_NAME: ${ADMIN_FIRST_NAME}
      ADMIN_LAST_NAME: ${ADMIN_LAST_NAME}
      # Cloudinary
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - erp-network
    restart: always

  erp_frontend:
    build:
      context: ./erp-frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* are baked at build time — must be the URL the
        # user's BROWSER will call (not the Docker internal hostname)
        NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
        NEXT_PUBLIC_APP_NAME: StoryStack
    image: erp_frontend:latest
    container_name: erp_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
      NEXT_PUBLIC_APP_NAME: StoryStack
    ports:
      - "3000:3000"
    depends_on:
      - erp_backend
    restart: always
    networks:
      - erp-network

volumes:
  erp_db:

networks:
  erp-network:
    driver: bridge
